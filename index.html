<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist - Royal Motors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* TEMA PRETO E DOURADO ROYAL MOTORS */
        body {
            background-color: #121212; /* Fundo escuro */
            color: #ffffff; /* Texto claro */
        }
        .text-muted {
            color: #b3b3b3 !important;
        }
        .card {
            background-color: #1e1e1e; /* Fundo dos cartões levemente mais claro que o body */
            border: 1px solid #333;
            color: #fff;
        }
        .form-control, .form-select {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
        }
        .form-control:focus, .form-select:focus {
            background-color: #333;
            border-color: #D4AF37; /* Dourado */
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
            color: #fff;
        }
        .btn-primary, .btn-success, .btn-dark {
            background-color: #D4AF37; /* Dourado Premium */
            border-color: #C5A017;
            color: #000; /* Texto preto no botão dourado para dar contraste */
            font-weight: bold;
        }
        .btn-primary:hover, .btn-success:hover, .btn-dark:hover {
            background-color: #b5952f;
            border-color: #a6882b;
            color: #000;
        }
        .btn-outline-secondary {
            color: #D4AF37;
            border-color: #D4AF37;
        }
        .btn-outline-secondary:hover {
            background-color: #D4AF37;
            color: #000;
        }
        /* Customizando textos de sucesso e erro */
        .text-success { color: #D4AF37 !important; } /* Usando o dourado como sucesso também */
        .text-danger { color: #ff6b6b !important; }
        
        /* Centralizando a logo */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-img {
            max-height: 100px; /* Ajuste o tamanho da sua logo aqui */
            object-fit: contain;
        }
    </style>
</head>
<body>

<div class="container mt-4 mb-5">
    
    <div class="logo-container mt-3">
        <img src="/static/logo.png" alt="Royal Motors" class="logo-img" onerror="this.style.display='none'">
    </div>

    <div id="tela-veiculo">
        <div class="text-center mb-4">
            <h2 style="color: #D4AF37;">Entrada de Veículo</h2>
            <p class="text-muted">Preencha os dados básicos do carro</p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form id="formVeiculo">
                    <div class="mb-3">
                        <label class="form-label">Placa</label>
                        <input type="text" class="form-control" id="placa" style="text-transform: uppercase;" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="form-label">Marca</label><input type="text" class="form-control" id="marca" required></div>
                        <div class="col-6 mb-3"><label class="form-label">Modelo</label><input type="text" class="form-control" id="modelo" required></div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3"><label class="form-label">Ano</label><input type="number" class="form-control" id="ano" required></div>
                        <div class="col-6 mb-3"><label class="form-label">Cor</label><input type="text" class="form-control" id="cor" required></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Cadastrar e Iniciar Checklist</button>
                </form>
                <div id="mensagem-veiculo" class="mt-3 text-center fw-bold"></div>
            </div>
        </div>
    </div>

    <div id="tela-checklist" class="d-none">
        <div class="text-center mb-4">
            <h2 style="color: #D4AF37;">Checklist de Pós Venda</h2>
            <p class="text-muted">Veículo ID: <span id="display-id-veiculo" class="fw-bold" style="color: #D4AF37;"></span></p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form id="formChecklist">
                    <div class="mb-3">
                        <label class="form-label">Responsável</label>
                        <input type="text" class="form-control" id="responsavel" required>
                    </div>
                    <h5 class="mt-4 border-bottom pb-2" style="border-color: #444 !important;">Estado de Conservação</h5>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Limpeza Externa</label>
                            <select class="form-select" id="limpeza_externa"><option>Bom</option><option>Médio</option><option>Ruim</option></select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Limpeza Interna</label>
                            <select class="form-select" id="limpeza_interna"><option>Bom</option><option>Médio</option><option>Ruim</option></select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Pneus</label>
                            <select class="form-select" id="pneus"><option>Bom</option><option>Médio</option><option>Ruim</option></select>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Estepe</label>
                            <select class="form-select" id="estepe"><option>Bom</option><option>Médio</option><option>Ruim</option></select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observações</label>
                        <textarea class="form-control" id="observacoes" rows="3" placeholder="Avarias, riscos, etc..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 mt-3">Salvar Checklist e Tirar Fotos</button>
                </form>
            </div>
        </div>
    </div>

    <div id="tela-fotos" class="d-none">
        <div class="text-center mb-4">
            <h2 style="color: #D4AF37;">Registro Fotográfico</h2>
            <p class="text-muted">Anexe as fotos do checklist ID: <span id="display-id-checklist" class="fw-bold" style="color: #D4AF37;"></span></p>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <form id="formFotos">
                    <div class="mb-3">
                        <label class="form-label">Tipo de Foto</label>
                        <select class="form-select" id="tipo_foto" name="tipo_foto">
                            <option value="Frontal">Frontal</option>
                            <option value="Traseira">Traseira</option>
                            <option value="Lateral Esquerda">Lateral Esquerda</option>
                            <option value="Lateral Direita">Lateral Direita</option>
                            <option value="Avaria">Avaria / Risco (Específico)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição (Opcional)</label>
                        <input type="text" class="form-control" id="descricao_foto" placeholder="Ex: Risco profundo na porta">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold" style="color: #D4AF37;">Capturar Imagem</label>
                        <input class="form-control form-control-lg" type="file" id="arquivo_foto" accept="image/*" capture="environment" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">Enviar Foto</button>
                </form>
                <div id="mensagem-foto" class="mt-3 text-center fw-bold"></div>
                <hr style="border-color: #444;">
                <button onclick="location.reload()" class="btn btn-outline-secondary w-100 mt-2">Finalizar e Voltar ao Início</button>
            </div>
        </div>
    </div>

</div>

<script>
    let idVeiculoAtual = null; let idChecklistAtual = null;

    document.getElementById('formVeiculo').addEventListener('submit', async function(e) {
        e.preventDefault();
        const dados = { placa: document.getElementById('placa').value, marca: document.getElementById('marca').value, modelo: document.getElementById('modelo').value, ano: parseInt(document.getElementById('ano').value), cor: document.getElementById('cor').value };
        try {
            const res = await fetch('/veiculos/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
            const json = await res.json();
            if (res.ok) { idVeiculoAtual = json.id_veiculo; document.getElementById('tela-veiculo').classList.add('d-none'); document.getElementById('tela-checklist').classList.remove('d-none'); document.getElementById('display-id-veiculo').innerText = idVeiculoAtual;
            } else { document.getElementById('mensagem-veiculo').innerText = "Erro: " + json.detail; document.getElementById('mensagem-veiculo').className = "mt-3 text-center fw-bold text-danger"; }
        } catch (erro) { alert("Erro de conexão."); }
    });

    document.getElementById('formChecklist').addEventListener('submit', async function(e) {
        e.preventDefault();
        const dados = { veiculo_id: idVeiculoAtual, responsavel: document.getElementById('responsavel').value, estado_limpeza_externa: document.getElementById('limpeza_externa').value, estado_limpeza_interna: document.getElementById('limpeza_interna').value, estado_pneus: document.getElementById('pneus').value, estado_estepe: document.getElementById('estepe').value, observacoes: document.getElementById('observacoes').value };
        try {
            const res = await fetch('/checklists/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(dados) });
            const json = await res.json();
            if (res.ok) { idChecklistAtual = json.id_checklist; document.getElementById('tela-checklist').classList.add('d-none'); document.getElementById('tela-fotos').classList.remove('d-none'); document.getElementById('display-id-checklist').innerText = idChecklistAtual;
            } else { alert("Erro ao salvar."); }
        } catch (erro) { alert("Erro de conexão."); }
    });

    document.getElementById('formFotos').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(); formData.append("tipo_foto", document.getElementById('tipo_foto').value); formData.append("descricao", document.getElementById('descricao_foto').value); formData.append("arquivo", document.getElementById('arquivo_foto').files[0]);
        try {
            const res = await fetch(`/checklists/${idChecklistAtual}/fotos/`, { method: 'POST', body: formData });
            if (res.ok) { document.getElementById('mensagem-foto').innerText = "✅ Foto enviada com sucesso!"; document.getElementById('mensagem-foto').className = "mt-3 text-center fw-bold text-success"; document.getElementById('formFotos').reset();
            } else { document.getElementById('mensagem-foto').innerText = "Erro ao enviar foto."; document.getElementById('mensagem-foto').className = "mt-3 text-center fw-bold text-danger"; }
        } catch (erro) { alert("Erro de conexão ao enviar imagem."); }
    });
</script>
</body>
</html>
